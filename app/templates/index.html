<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MLB Probable Pitchers • Matchups</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .headshot { width: 80px; height: 80px; object-fit: cover; border-radius: 9999px; border: 3px solid #003087; }
        .grade-A { background: #22c55e; }
        .grade-B { background: #a3e635; }
        .grade-C { background: #f59e0b; }
        .grade-D { background: #ef4444; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-6xl mx-auto p-6">
        <h1 class="text-4xl font-bold text-center mb-8 flex items-center justify-center gap-3">
            🔥 MLB Probable Pitchers
        </h1>

        <form method="get" class="flex justify-center gap-4 mb-10">
            <input type="date" name="date" value="{{ selected_date }}" 
                   class="bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-3 text-lg">
            <button type="submit" 
                    class="bg-blue-600 hover:bg-blue-700 px-8 rounded-xl font-semibold">
                Voir
            </button>
        </form>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            {% for g in games %}
            <div class="bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 hover:border-blue-500 transition-all">
                <!-- Header -->
                <div class="bg-zinc-800 px-6 py-4 flex justify-between items-center">
                    <div class="text-xl font-bold">{{ g.time }}</div>
                    <div class="text-lg">
                        <strong>{{ g.away_team }}</strong> @ <strong>{{ g.home_team }}</strong>
                    </div>
                </div>

                <div class="p-6 grid grid-cols-2 gap-6">
                    <!-- Away Pitcher -->
                    <div class="text-center">
                        {% if g.away_pitcher.id %}
                        <img src="https://img.mlbstatic.com
